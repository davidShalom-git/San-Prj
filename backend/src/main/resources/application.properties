spring.application.name=resume-builder-backend
server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

vertex.ai.credentials-path=${GOOGLE_APPLICATION_CREDENTIALS:../gen-lang-client-0506905559-a9238ec231c0.json}
vertex.ai.project-id=${VERTEX_AI_PROJECT_ID:}
vertex.ai.location=${VERTEX_AI_LOCATION:us-central1}
vertex.ai.model=${VERTEX_AI_MODEL:gemini-2.5-pro}
